services:
  db:
    image: pgvector/pgvector:pg16
    container_name: raoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raoc
      POSTGRES_PASSWORD: raoc
      POSTGRES_DB: raoc
    ports:
      - "5432:5432"
    volumes:
      - raoc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raoc -d raoc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  raoc_pgdata:
